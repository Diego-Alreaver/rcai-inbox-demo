<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ReadyChatAI · Tu Instagram responde solo</title>
<!-- Inline favicon so the demo emits zero 404s (no external favicon request). -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%237354EF'/%3E%3Ccircle%20cx='12'%20cy='16'%20r='2.6'%20fill='white'/%3E%3Ccircle%20cx='20'%20cy='16'%20r='2.6'%20fill='white'/%3E%3C/svg%3E" />

<!-- Google Fonts: Urbanist (the real app wires next/font Urbanist to --font-urbanist) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Tailwind v3 Play CDN (matches the repo's Tailwind 3.4) -->
<script src="https://cdn.tailwindcss.com/3.4.16"></script>

<!-- RCAI chat-kit: real-SVG icon kit (Lucide + Simple Icons). NO webfont glyphs. -->
<script src="assets/chat-kit.js"></script>

<style>
  :root {
    /* Brand Colors (globals.css :root, verbatim) */
    --brand-secondary: #7f56d9;
    --brand-700: #7354ef;
    --brand-500: #9e77ed;
    --gray-50: #f9fafb;
    --gray-300: #d0d5dd;
    --font-urbanist: 'Urbanist', sans-serif;

    /* Inside the phone: the platform's OWN system font (reads native, not branded). */
    --ig-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;

    /* Instagram DM sent-bubble gradient (authentic: blue -> purple). */
    --ig-sent: linear-gradient(135deg, #3A7BDE 0%, #4F5BD5 34%, #6D3DC4 72%, #8A3AB9 100%);
    --ig-gray: #efefef;
  }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }

  /* Painted kit icons: the injected <svg> sizes itself; the host just centers it. */
  .ic { display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
  .ic svg { display: block; }

  /* ============================================================
     STAGE — fixed 1440x880 canvas (matches the landing iframe).
     Light brand backdrop so the piece reads as an on-theme hero.
     ============================================================ */
  #stage {
    position: relative;
    width: 1440px;
    height: 880px;
    margin: 0 auto;
    overflow: hidden;
    background:
      radial-gradient(1200px 700px at 50% 38%, #ffffff 0%, #faf8ff 46%, #f3effc 100%),
      linear-gradient(180deg, #ffffff, #f6f3fe);
    font-family: var(--font-urbanist);
    color: #1d2939;
  }
  #stage::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(115,84,239,0.06) 1.4px, transparent 1.4px);
    background-size: 30px 30px;
    pointer-events: none;
  }
  .orb { position: absolute; border-radius: 9999px; filter: blur(60px); pointer-events: none; opacity: 0.5; }
  .orb-1 { width: 420px; height: 420px; left: -120px; top: -90px;  background: radial-gradient(circle, rgba(158,119,237,0.45), transparent 70%); }
  .orb-2 { width: 480px; height: 480px; right: -150px; bottom: -130px; background: radial-gradient(circle, rgba(115,84,239,0.40), transparent 70%); }

  /* ============================================================
     HEADLINE — brand + "instant AI" story lives AROUND the phone,
     NEVER inside the Instagram UI (honesty requirement).
     ============================================================ */
  .headline { position: absolute; left: 90px; top: 190px; width: 600px; z-index: 6; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 11px;
    font-size: 21px; font-weight: 800; letter-spacing: 0.03em;
    color: #7354ef;
    background: rgba(115,84,239,0.09);
    padding: 9px 19px; border-radius: 9999px;
  }
  .eyebrow .bolt { color: #f5a623; }
  .eyebrow .ig-mark { display: inline-flex; }
  .headline h1 {
    margin: 24px 0 0; font-size: 53px; font-weight: 800; line-height: 1.05;
    letter-spacing: -0.027em; color: #101828;
  }
  .headline h1 .accent { color: #7354ef; }
  .headline p {
    margin: 19px 0 0; font-size: 30px; font-weight: 500; line-height: 1.36; color: #667085;
    max-width: 548px;
  }
  .ticks { margin: 30px 0 0; display: flex; flex-direction: column; gap: 16px; }
  .tick { display: flex; align-items: center; gap: 14px; font-size: 30px; font-weight: 600; color: #344054; }
  .tick .tick-ic {
    flex: 0 0 38px; width: 38px; height: 38px; border-radius: 9999px;
    background: rgba(115,84,239,0.12); color: #7354ef;
  }

  /* ============================================================
     PHONE — the dominant element. 500x818 (>= 90% of 880 tall).
     ============================================================ */
  #phone {
    position: absolute; left: 745px; top: 31px; z-index: 5;
    width: 500px; height: 818px;
    background: linear-gradient(160deg, #15151c, #050507);
    border-radius: 52px;
    padding: 12px;
    box-shadow:
      0 50px 90px -30px rgba(16,24,40,0.50),
      0 14px 40px -16px rgba(115,84,239,0.30),
      0 0 0 1px rgba(16,24,40,0.04);
  }
  .screen {
    position: relative;
    width: 100%; height: 100%;
    background: #ffffff;
    border-radius: 41px;
    overflow: hidden;
    display: flex; flex-direction: column;
    font-family: var(--ig-font);
  }
  /* Dynamic-island hint. */
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 116px; height: 28px; background: #000; border-radius: 16px; z-index: 30;
  }

  /* iOS status bar. */
  .statusbar {
    flex: 0 0 40px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 30px; color: #050505;
  }
  .sb-time { font-size: 19px; font-weight: 700; letter-spacing: 0.02em; }
  .sb-icons { display: flex; align-items: center; gap: 8px; }

  /* Instagram DM header. */
  .ig-header {
    flex: 0 0 74px; display: flex; align-items: center; gap: 0;
    padding: 0 16px; border-bottom: 1px solid #efefef; background: #fff;
  }
  .ig-header .back { color: #111; margin-right: 6px; }
  .ig-avatar {
    flex: 0 0 48px; width: 48px; height: 48px; border-radius: 50%;
    overflow: hidden; background: #f0e9ff;
    box-shadow: 0 3px 10px -4px rgba(16,24,40,0.35);
    margin-right: 13px;
  }
  .ig-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ig-id { flex: 1 1 auto; min-width: 0; }
  .ig-name {
    font-size: 27px; font-weight: 700; color: #0a0a0a; letter-spacing: -0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.08;
  }
  .ig-status { font-size: 19px; font-weight: 400; color: #8e8e8e; margin-top: 2px; }
  .ig-header .hdr-ic { color: #111; }
  .ig-header .hdr-ic.call { margin-left: 8px; margin-right: 20px; }

  /* Thread — clips overflow; the feed is BOTTOM-anchored (chat scrolled to
     newest). justify-content:flex-end makes a tall feed overflow at the TOP
     (oldest date/message clips, realistic) so the newest bot reply is always
     fully visible above the composer — never bottom-clipped. */
  .thread {
    flex: 1 1 auto; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 12px 18px 14px;
    background: #fff;
  }

  .row {
    display: flex; margin-top: 13px;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.46s cubic-bezier(0.22,1,0.36,1);
  }
  .row.shown { opacity: 1; transform: none; }
  .row.out { justify-content: flex-end; }
  .row.in  { justify-content: flex-start; align-items: flex-end; gap: 9px; }
  .row.date-row { justify-content: center; margin: 6px 0 2px; }

  .datestamp { font-size: 19px; font-weight: 600; color: #b0b0b0; letter-spacing: 0.03em; }

  .msg {
    max-width: 78%;
    padding: 15px 21px;
    font-size: 31px; line-height: 1.30; font-weight: 400;
    border-radius: 26px;
    word-wrap: break-word;
  }
  .msg-out {
    background: var(--ig-sent); color: #fff;
    border-bottom-right-radius: 8px;
    box-shadow: 0 10px 22px -12px rgba(106,49,185,0.55);
  }
  .msg-in {
    background: var(--ig-gray); color: #0a0a0a;
    border-bottom-left-radius: 8px;
  }

  /* Small business avatar beside bot (received) bubbles. */
  .av-sm {
    flex: 0 0 38px; width: 38px; height: 38px; border-radius: 50%;
    overflow: hidden; background: #f0e9ff; margin-bottom: 2px;
  }
  .av-sm img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Instagram typing-dots indicator (gray bubble). */
  .msg.typing { display: flex; align-items: center; gap: 10px; padding: 22px 23px; }
  .msg.typing span {
    width: 13px; height: 13px; border-radius: 50%; background: #b0b0b0;
    animation: igdot 1.2s infinite ease-in-out;
  }
  .msg.typing span:nth-child(2) { animation-delay: 0.18s; }
  .msg.typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes igdot {
    0%, 80%, 100% { transform: translateY(0);   opacity: 0.40; }
    40%           { transform: translateY(-8px); opacity: 1; }
  }

  /* Instagram composer (at rest — never typed into). */
  .composer {
    flex: 0 0 86px; display: flex; align-items: center; gap: 13px;
    padding: 0 17px; border-top: 1px solid #efefef; background: #fff;
  }
  .cam {
    flex: 0 0 48px; width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #4F5BD5, #8A3AB9);
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .cbar {
    flex: 1 1 auto; height: 54px; border: 1.5px solid #dbdbdb; border-radius: 9999px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 19px;
  }
  .cbar .ph { font-size: 23px; font-weight: 400; color: #8e8e8e; }
  .cbar .cicons { display: flex; align-items: center; gap: 17px; color: #262626; }

  /* Feed dissolve on loop reset. */
  .feed.dissolving { opacity: 0; transition: opacity 0.5s ease; }

  /* ============================================================
     REDUCED MOTION — compose a full static frame (whole exchange).
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .msg.typing span { animation: none !important; }
    .row, .feed { transition: none !important; }
  }
</style>

<script>
  tailwind.config = {
    theme: { extend: { fontFamily: {
      urbanist: ['var(--font-urbanist)', 'sans-serif'],
      sans:     ['var(--font-urbanist)', 'sans-serif'],
    } } },
  };
</script>
</head>

<body class="font-urbanist">
  <!-- Fixed 1440x880 canvas so it drops into the landing hero iframe unchanged. -->
  <div id="stage" aria-label="Ilustración: ReadyChatAI responde automáticamente los mensajes directos de Instagram de Dulce Lina Repostería">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Brand headline / AI-speed story (lives on the stage, not inside Instagram). -->
    <div class="headline">
      <span class="eyebrow">
        <span class="ic bolt"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#f5a623" aria-hidden="true"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></span>
        <span class="ic ig-mark" data-icon="ig-logo" data-size="22"></span>
        Instagram · al instante
      </span>
      <h1>Tu Instagram<br><span class="accent">responde solo.</span></h1>
      <p>El bot contesta los DMs de tus clientes al instante, 24/7 — sin que muevas un dedo.</p>
      <div class="ticks">
        <div class="tick"><span class="ic tick-ic" data-icon="check" data-size="22" data-stroke="2.6"></span> Respuestas en segundos</div>
        <div class="tick"><span class="ic tick-ic" data-icon="check" data-size="22" data-stroke="2.6"></span> Atiende de día y de noche</div>
        <div class="tick"><span class="ic tick-ic" data-icon="check" data-size="22" data-stroke="2.6"></span> Cero clientes perdidos</div>
      </div>
    </div>

    <!-- The phone (dominant). Inside it: an authentic Instagram DM thread. -->
    <div id="phone">
      <div class="screen">
        <div class="island"></div>

        <div class="statusbar">
          <span class="sb-time">9:41</span>
          <span class="sb-icons">
            <span class="ic" data-icon="signal" data-size="18" data-stroke="2.4"></span>
            <span class="ic" data-icon="wifi" data-size="18" data-stroke="2.4"></span>
            <span class="ic" data-icon="battery" data-size="22" data-stroke="2.2"></span>
          </span>
        </div>

        <div class="ig-header">
          <span class="ic back" data-icon="chevron-left" data-size="30" data-stroke="2.2"></span>
          <div class="ig-avatar"><img src="assets/gen/bakery-avatar.png" alt="Dulce Lina Repostería" /></div>
          <div class="ig-id">
            <div class="ig-name">dulcelina.reposteria</div>
            <div class="ig-status">Activo(a) ahora</div>
          </div>
          <span class="ic hdr-ic call" data-icon="phone" data-size="27" data-stroke="2"></span>
          <span class="ic hdr-ic" data-icon="video" data-size="28" data-stroke="2"></span>
        </div>

        <div class="thread">
          <div class="feed" id="feed"></div>
        </div>

        <div class="composer">
          <div class="cam"><span class="ic" data-icon="camera" data-size="25" data-color="#ffffff"></span></div>
          <div class="cbar">
            <span class="ph">Mensaje...</span>
            <span class="cicons">
              <span class="ic" data-icon="mic" data-size="25" data-stroke="2"></span>
              <span class="ic" data-icon="image" data-size="25" data-stroke="2"></span>
              <span class="ic" data-icon="ig-heart" data-size="25" data-stroke="2"></span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ---- Paint every kit icon placeholder ([data-icon]) once. ---------------
      function paintIcons(root) {
        var nodes = (root || document).querySelectorAll('[data-icon]');
        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          if (n.getAttribute('data-painted')) continue;
          var opts = {};
          var size = n.getAttribute('data-size');   if (size)   opts.size = parseFloat(size);
          var strk = n.getAttribute('data-stroke'); if (strk)   opts.stroke = parseFloat(strk);
          var col  = n.getAttribute('data-color');  if (col)    opts.color = col;
          n.innerHTML = window.RCAI_ICON(n.getAttribute('data-icon'), opts);
          n.setAttribute('data-painted', '1');
        }
      }
      paintIcons(document);

      var feed = document.getElementById('feed');
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Authentic, short, legible bakery DM thread (Dulce Lina · Repostería).
      var M = {
        cust1: '¡Hola! ¿Hacen pasteles a pedido? 🎂',
        bot1:  '¡Hola Emma! 💜 ¡Claro que sí! ¿Para qué fecha?',
        cust2: 'Para el sábado, de chocolate 🎉',
        bot2:  '¡Perfecto! ¿Para cuántas personas?'
      };

      var AV = '<div class="av-sm"><img src="assets/gen/bakery-avatar.png" alt="" /></div>';
      var DOTS = '<span></span><span></span><span></span>';

      function el(cls, html) {
        var d = document.createElement('div');
        d.className = cls;
        d.innerHTML = html;
        feed.appendChild(d);
        return d;
      }
      function reveal(node) {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { node.classList.add('shown'); });
        });
      }
      function addDate()      { return el('row date-row', '<div class="datestamp">HOY 14:32</div>'); }
      function addCustomer(t) { return el('row out', '<div class="msg msg-out">' + t + '</div>'); }
      function addBot(t)      { return el('row in', AV + '<div class="msg msg-in">' + t + '</div>'); }
      function addTyping()    { return el('row in typing-row', AV + '<div class="msg msg-in typing">' + DOTS + '</div>'); }

      // ---- Reduced motion: compose the full static exchange. ------------------
      if (reduce) {
        addDate().classList.add('shown');
        addCustomer(M.cust1).classList.add('shown');
        addBot(M.bot1).classList.add('shown');
        addCustomer(M.cust2).classList.add('shown');
        addBot(M.bot2).classList.add('shown');
        return;
      }

      // ---- Animated timeline --------------------------------------------------
      // Tuned so all four bubbles are revealed + settled by ~5.2s and HOLD through
      // the fixed 6.5s verify screenshot (the "money frame" must show the full,
      // already-answered exchange — never typing dots with the last Q unanswered).
      var timers = [];
      function after(ms, fn) { timers.push(setTimeout(fn, ms)); }
      function clearTimers() { timers.forEach(clearTimeout); timers = []; }

      function runCycle() {
        clearTimers();
        feed.classList.remove('dissolving');
        feed.innerHTML = '';

        var t = 0;
        var typingNode = null;
        function clearTyping() {
          if (typingNode && typingNode.parentNode) typingNode.parentNode.removeChild(typingNode);
          typingNode = null;
        }

        // Date header.
        after((t += 100), function () { reveal(addDate()); });

        // Exchange 1 — customer asks, bot is typing, bot replies fast.
        after((t += 400), function () { reveal(addCustomer(M.cust1)); });
        after((t += 700), function () { typingNode = addTyping(); reveal(typingNode); });
        after((t += 900), function () { clearTyping(); reveal(addBot(M.bot1)); });

        // Exchange 2 — second quick Q&A (fully landed by ~5.2s).
        after((t += 1000), function () { reveal(addCustomer(M.cust2)); });
        after((t += 800),  function () { typingNode = addTyping(); reveal(typingNode); });
        after((t += 1000), function () { clearTyping(); reveal(addBot(M.bot2)); });

        // Long readable end-hold (covers the verify frame), then dissolve + loop.
        after((t += 4800), function () { feed.classList.add('dissolving'); });
        after((t += 560),  function () { runCycle(); });
      }

      function start() { after(300, runCycle); }
      if (document.readyState === 'complete') start();
      else window.addEventListener('load', start, { once: true });
    })();
  </script>
</body>
</html>
