<script>
window.DEMO_CONFIG = {
  id: 'instagram-dm',
  mode: 'desktop',
  platform: 'instagram',
  surface: 'phone',
  business: { name: 'Verde Vivo', handle: 'verdevivo.plantas', avatar: 'assets/gen/verdevivo-avatar.webp', online: true },
  igProfile: { followers: { es: '24,1 mil seguidores', en: '24.1K followers' } },
  contentImage: 'assets/gen/verdevivo-plant.webp',
  // "The bot learns": conv1 (bot honestly saves an unknown question) → KB scene

  learnFlow: true,
  locales: {
    es: {
      stage: {
        eyebrow: 'Instagram DM · Verde Vivo',
        h1: 'Cuando no sabe algo,',
        h1accent: 'lo aprende de ti.',
        sub: 'Si el bot no tiene una respuesta, no la inventa: registra la pregunta para que la contestes una vez. La guarda en su base de conocimiento y desde ahí responde solo a quien pregunte lo mismo.',
        ticks: [
          'Nunca inventa: si no sabe, registra la pregunta',
          'Tú la respondes una sola vez en tu panel',
          'El bot la aprende y contesta solo la próxima vez'
        ],
        cta: 'Conecta tu Instagram'
      },
      learn: {
        conv1: [
          { from: 'customer', text: 'holaa 🌿 me encanta su tienda. ¿hacen envíos internacionales? me mudo a España el próximo mes 😅' },
          { from: 'bot', text: '¡Hola! 🌿 Gracias, qué lindo 💚 Mira, te soy honesto: los envíos internacionales aún no los tengo confirmados y no quiero inventarte nada. Ya registré tu pregunta y mi equipo la va a responder en breve 🙌' }
        ],
        question: { es: '¿Hacen envíos internacionales a España?', en: 'Do you ship internationally to Spain?' },
        answer: { es: '¡Sí! Enviamos a España vía courier. Llega en 5–8 días hábiles y el costo se calcula al finalizar la compra según el peso 🌍', en: 'Yes! We ship to Spain via courier. It arrives in 5–8 business days and the cost is calculated at checkout by weight 🌍' },
        conv2: [
          { from: 'customer', text: 'hola! una consulta rápida: ¿envían a España? 🇪🇸' },
          { from: 'bot', beat: 'learnedPill' },
          { from: 'bot', text: '¡Hola! 🌿 ¡Sí! Enviamos a España vía courier ✈️ Llega en 5–8 días hábiles y el costo se calcula al finalizar la compra según el peso. ¿Te ayudo a armar tu pedido? 💚' }
        ]
      }
    },
    en: {
      stage: {
        eyebrow: 'Instagram DM · Verde Vivo',
        h1: 'When it doesn’t know,',
        h1accent: 'it learns from you.',
        sub: 'If the bot doesn’t have an answer, it doesn’t make one up: it logs the question for you to answer once. It saves it to its knowledge base and answers on its own from then on.',
        ticks: [
          'Never makes things up: if unsure, it logs the question',
          'You answer it once in your dashboard',
          'The bot learns it and answers on its own next time'
        ],
        cta: 'Connect your Instagram'
      },
      learn: {
        conv1: [
          { from: 'customer', text: 'hii 🌿 I love your shop. do you ship internationally? I’m moving to Spain next month 😅' },
          { from: 'bot', text: 'Hi there! 🌿 Thank you, that’s so kind 💚 I’ll be honest with you: I don’t have international shipping confirmed yet and I don’t want to make something up. I’ve logged your question and my team will answer it shortly 🙌' }
        ],
        question: { es: '¿Hacen envíos internacionales a España?', en: 'Do you ship internationally to Spain?' },
        answer: { es: '¡Sí! Enviamos a España vía courier. Llega en 5–8 días hábiles y el costo se calcula al finalizar la compra según el peso 🌍', en: 'Yes! We ship to Spain via courier. It arrives in 5–8 business days and the cost is calculated at checkout by weight 🌍' },
        conv2: [
          { from: 'customer', text: 'hi! quick one: do you ship to Spain? 🇪🇸' },
          { from: 'bot', beat: 'learnedPill' },
          { from: 'bot', text: 'Hi there! 🌿 Yes! We ship to Spain via courier ✈️ It arrives in 5–8 business days and the cost is calculated at checkout by weight. Want me to help you put your order together? 💚' }
