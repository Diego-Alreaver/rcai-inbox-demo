<style>
  :root {
    --brand-secondary: #7f56d9;
    --brand-700: #7354ef;
    --brand-500: #9e77ed;
    --font-urbanist: 'Urbanist', sans-serif;

    --web-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

    --teal-700: #0c8a7e;
    --teal-600: #0f9e91;
    --teal-500: #14b8a6;
    --teal-grad: linear-gradient(135deg, #15bda9 0%, #0d9488 100%);
    --mint-50:  #ecfdf8;
    --mint-100: #d6f6ee;
    --visitor-bg: #eef0f3;
    --ink: #1f2a37;
  }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  .ic { display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
  .ic svg { display: block; }

  /* ============================================================
     STAGE — fixed 430x900 PORTRAIT canvas (mobile column sibling).
     ============================================================ */
  #stage {
    position: relative;
    width: 430px; height: 900px;
    margin: 0 auto; overflow: hidden;
    background:
      radial-gradient(640px 560px at 50% 28%, #ffffff 0%, #faf8ff 48%, #f3effc 100%),
      linear-gradient(180deg, #ffffff, #f5f1fe);
    font-family: var(--font-urbanist);
    color: #1d2939;
  }
  #stage::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(115,84,239,0.06) 1.3px, transparent 1.3px);
    background-size: 26px 26px; pointer-events: none;
  }
  .orb { position: absolute; border-radius: 9999px; filter: blur(58px); pointer-events: none; opacity: 0.5; }
  .orb-1 { width: 300px; height: 300px; left: -110px; top: -70px;   background: radial-gradient(circle, rgba(158,119,237,0.45), transparent 70%); }
  .orb-2 { width: 340px; height: 340px; right: -130px; bottom: -120px; background: radial-gradient(circle, rgba(20,184,166,0.30), transparent 70%); }

  /* Small brand chip — the only stage copy; lives ABOVE the phone. */
  .eyebrow {
    position: absolute; top: 17px; left: 50%; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 9px; z-index: 6;
    font-size: 19px; font-weight: 800; letter-spacing: 0.02em;
    color: #7354ef; background: rgba(115,84,239,0.10);
    padding: 8px 18px; border-radius: 9999px; white-space: nowrap;
    box-shadow: 0 6px 18px -10px rgba(115,84,239,0.45);
  }
  .eyebrow .globe { color: #7354ef; }

  /* ============================================================
     PHONE — dominant. 398x814 fills the 430x900 stage.
     Inside it: a MOBILE BROWSER on the clinic site + the widget.
     ============================================================ */
  #phone {
    position: absolute; left: 16px; top: 64px; z-index: 5;
    width: 398px; height: 814px;
    background: linear-gradient(160deg, #15151c, #050507);
    border-radius: 50px; padding: 11px;
    box-shadow:
      0 46px 84px -28px rgba(16,24,40,0.50),
      0 14px 38px -16px rgba(20,184,166,0.26),
      0 0 0 1px rgba(16,24,40,0.04);
  }
  .screen {
    position: relative; width: 100%; height: 100%;
    background: #ffffff; border-radius: 40px; overflow: hidden;
    display: flex; flex-direction: column; font-family: var(--web-font);
  }
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 112px; height: 27px; background: #000; border-radius: 16px; z-index: 40;
  }

  /* iOS status bar. */
  .statusbar {
    flex: 0 0 40px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 27px; color: #050505; background: #ffffff;
  }
  .sb-time { font-size: 19px; font-weight: 700; letter-spacing: 0.02em; }
  .sb-icons { display: flex; align-items: center; gap: 8px; }

  /* Mobile browser address bar. */
  .baddr {
    flex: 0 0 48px; display: flex; align-items: center; gap: 10px;
    padding: 0 16px; background: #f1f2f4; border-bottom: 1px solid #e4e6e9;
  }
  .baddr .urlpill {
    flex: 1 1 auto; height: 34px; background: #ffffff; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: #5a6675; font-size: 17px; font-weight: 600;
    box-shadow: inset 0 0 0 1px #dde0e4;
  }
  .baddr .urlpill .ic { color: #7a8696; }
  .baddr .bx { color: #8a94a1; }

  /* Mobile clinic website. */
  .msite { flex: 1 1 auto; overflow: hidden; background: #ffffff; }
  .site-nav {
    height: 60px; display: flex; align-items: center; padding: 0 18px;
    border-bottom: 1px solid #eef0f2;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark { width: 34px; height: 34px; border-radius: 10px; overflow: hidden; background: var(--mint-100); box-shadow: 0 2px 8px -3px rgba(13,148,136,0.5); }
  .brand .mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .brand .bname { font-size: 20px; font-weight: 800; color: #0f5e57; letter-spacing: -0.01em; }
  .nav-cta { margin-left: auto; font-size: 16px; font-weight: 700; color: #fff; background: var(--teal-grad); padding: 9px 16px; border-radius: 9999px; box-shadow: 0 8px 18px -8px rgba(13,148,136,0.6); }

  .hero { position: relative; height: 280px; overflow: hidden; }
  .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .hero .scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(8,52,48,0.12) 0%, rgba(8,52,48,0.30) 45%, rgba(8,52,48,0.82) 100%); }
  .hero .htext { position: absolute; left: 22px; right: 22px; bottom: 22px; }
  .hero .heyebrow { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #b8f5e8; background: rgba(255,255,255,0.16); padding: 5px 13px; border-radius: 9999px; }
  .hero h2 { margin: 13px 0 0; font-size: 36px; font-weight: 800; line-height: 1.08; color: #fff; letter-spacing: -0.02em; }
  .hero .hbtn { display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 17px; font-weight: 700; color: #0c5a52; background: #fff; padding: 12px 22px; border-radius: 9999px; box-shadow: 0 12px 26px -10px rgba(0,0,0,0.45); }
  .hero .hbtn .ic { color: #0f9e91; }

  .services { padding: 18px 18px 0; }
  .services .stitle { font-size: 14px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #95a0ad; }
  .scards { display: flex; gap: 12px; margin-top: 12px; }
  .scard { flex: 1 1 0; background: #f7fbfa; border: 1px solid #e6f1ee; border-radius: 14px; padding: 14px; }
  .scard .sic { width: 40px; height: 40px; border-radius: 11px; background: var(--mint-100); color: var(--teal-600); display: inline-flex; align-items: center; justify-content: center; }
  .scard .sname { margin-top: 10px; font-size: 17px; font-weight: 800; color: #233038; }
  .scard .sprice { margin-top: 3px; font-size: 15px; font-weight: 600; color: #6b7682; }

  /* ============================================================
     WIDGET LAUNCHER — mint/teal circle bottom-right of the screen.
     ============================================================ */
  #launcher {
    position: absolute; right: 18px; bottom: 18px; z-index: 11;
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--teal-grad); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 30px -10px rgba(13,148,136,0.6), 0 4px 10px -4px rgba(13,148,136,0.5);
  }
  #launcher .ic { color: #fff; }
  #launcher.open { opacity: 0; pointer-events: none; }
  #launcher.pulsing { animation: wg-pulse 1.15s ease-out 2; }
  @keyframes wg-pulse {
    0%   { box-shadow: 0 16px 30px -10px rgba(13,148,136,0.6), 0 0 0 0 rgba(20,184,166,0.45); }
    70%  { box-shadow: 0 16px 30px -10px rgba(13,148,136,0.6), 0 0 0 22px rgba(20,184,166,0); }
    100% { box-shadow: 0 16px 30px -10px rgba(13,148,136,0.6), 0 0 0 0 rgba(20,184,166,0); }
  }

  /* ============================================================
     WIDGET PANEL — opens to NEAR-FULLSCREEN (below the browser bar).
     ============================================================ */
  #panel {
    position: absolute; left: 0; right: 0; top: 88px; bottom: 0; z-index: 12;
    background: #ffffff; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 -10px 40px -16px rgba(16,24,40,0.30);
    transform-origin: bottom right;
    transform: scale(0.12); opacity: 0; pointer-events: none;
    transition: transform 0.46s cubic-bezier(0.22,1,0.36,1), opacity 0.30s ease;
  }
  #panel.open { transform: scale(1); opacity: 1; pointer-events: auto; }

  .pheader {
    flex: 0 0 78px; display: flex; align-items: center; gap: 13px;
    padding: 0 18px; background: var(--teal-grad); color: #fff;
  }
  .pheader .pav { flex: 0 0 48px; width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.55); }
  .pheader .pav img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pheader .pid { flex: 1 1 auto; min-width: 0; }
  .pheader .pname { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.1; }
  .pheader .pstatus { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.92); margin-top: 3px; }
  .pheader .dot { width: 9px; height: 9px; border-radius: 50%; background: #6ee7b7; box-shadow: 0 0 0 2px rgba(110,231,183,0.35); }
  .pheader .pmin { color: rgba(255,255,255,0.9); }

  .pthread {
    flex: 1 1 auto; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 16px 16px 14px;
    background: radial-gradient(560px 360px at 80% 0%, #f1fcf9 0%, rgba(241,252,249,0) 70%), #ffffff;
  }
  .feed { display: flex; flex-direction: column; }
  .feed.dissolving { opacity: 0; transition: opacity 0.5s ease; }

  .row {
    display: flex; margin-top: 13px;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.38s ease, transform 0.44s cubic-bezier(0.22,1,0.36,1);
  }
  .row.shown { opacity: 1; transform: none; }
  .row.out { justify-content: flex-end; }
  .row.in  { justify-content: flex-start; align-items: flex-end; gap: 9px; }

  .av-sm { flex: 0 0 34px; width: 34px; height: 34px; border-radius: 50%; overflow: hidden; background: var(--mint-100); margin-bottom: 2px; }
  .av-sm img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .botcol { display: flex; flex-direction: column; align-items: flex-start; max-width: 86%; gap: 9px; }

  .msg {
    max-width: 80%; padding: 12px 16px;
    font-size: 22px; line-height: 1.34; font-weight: 500;
    border-radius: 20px; word-wrap: break-word;
  }
  .msg-out { background: var(--visitor-bg); color: var(--ink); border-bottom-right-radius: 7px; }
  .msg-in  { background: var(--teal-grad); color: #fff; border-bottom-left-radius: 7px; box-shadow: 0 10px 20px -12px rgba(13,148,136,0.55); }
  .botcol .msg { max-width: 100%; }

  .msg.typing { display: flex; align-items: center; gap: 8px; padding: 16px 18px; background: #eef1f3; }
  .msg.typing span { width: 11px; height: 11px; border-radius: 50%; background: #9aa6b2; animation: wgdot 1.2s infinite ease-in-out; }
  .msg.typing span:nth-child(2) { animation-delay: 0.18s; }
  .msg.typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes wgdot {
    0%, 80%, 100% { transform: translateY(0);   opacity: 0.40; }
    40%           { transform: translateY(-8px); opacity: 1; }
  }

  /* slotPicker chips. */
  .chips { display: flex; flex-wrap: wrap; gap: 9px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 19px; font-weight: 700; color: var(--teal-700);
    background: #fff; border: 1.5px solid #b7e7df; border-radius: 13px;
    padding: 11px 15px; box-shadow: 0 4px 10px -6px rgba(13,148,136,0.4);
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .chip .ic { color: var(--teal-500); }
  .chip.sel { background: var(--teal-grad); color: #fff; border-color: transparent; box-shadow: 0 10px 20px -8px rgba(13,148,136,0.6); }
  .chip.sel .ic { color: #fff; }

  /* bookingConfirmed card. */
  .confcard { width: 100%; background: #fff; border: 1.5px solid #cdeee6; border-radius: 18px; padding: 15px 17px 17px; box-shadow: 0 14px 28px -16px rgba(13,148,136,0.45); }
  .conf-head { display: flex; align-items: center; gap: 9px; padding-bottom: 12px; border-bottom: 1px solid #edf3f1; }
  .conf-head .ct { font-size: 19px; font-weight: 800; color: #15803d; letter-spacing: -0.01em; }
  .conf-row { display: flex; align-items: center; gap: 11px; margin-top: 11px; font-size: 19px; color: #2a3640; font-weight: 600; }
  .conf-row.lead { font-size: 20px; font-weight: 800; color: #15302c; }
  .conf-row .ic { flex: 0 0 22px; color: var(--teal-600); }

  /* Composer (at rest). */
  .pcomposer { flex: 0 0 70px; display: flex; align-items: center; gap: 11px; padding: 0 16px; border-top: 1px solid #eef0f2; background: #fff; }
  .cbar { flex: 1 1 auto; height: 50px; border: 1.5px solid #e1e5ea; border-radius: 9999px; display: flex; align-items: center; padding: 0 20px; }
  .cbar .ph { font-size: 19px; font-weight: 500; color: #99a3ae; }
  .csend { flex: 0 0 50px; width: 50px; height: 50px; border-radius: 50%; background: var(--teal-grad); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px -6px rgba(13,148,136,0.6); }
  .csend .ic { color: #fff; }

  .powered { text-align: center; font-size: 14px; font-weight: 600; color: #aeb6c0; padding: 6px 0 8px; background: #fff; }
  .powered b { color: #7354ef; font-weight: 800; }

  @media (prefers-reduced-motion: reduce) {
    .msg.typing span { animation: none !important; }
    .row, .feed, #panel, #launcher { transition: none !important; animation: none !important; }
  }
</style>

<script>
  tailwind.config = { theme: { extend: { fontFamily: {
    urbanist: ['var(--font-urbanist)', 'sans-serif'],
    sans:     ['var(--font-urbanist)', 'sans-serif'],
  } } } };
</script>

  <script>
    (function () {
      'use strict';

      function paintIcons(root) {
        var nodes = (root || document).querySelectorAll('[data-icon]');
        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          if (n.getAttribute('data-painted')) continue;
          var opts = {};
          var size = n.getAttribute('data-size');   if (size) opts.size = parseFloat(size);
          var strk = n.getAttribute('data-stroke'); if (strk) opts.stroke = parseFloat(strk);
          var col  = n.getAttribute('data-color');  if (col)  opts.color = col;
          n.innerHTML = window.RCAI_ICON(n.getAttribute('data-icon'), opts);
          n.setAttribute('data-painted', '1');
        }
      }
      paintIcons(document);

      var feed = document.getElementById('feed');
      var panel = document.getElementById('panel');
      var launcher = document.getElementById('launcher');
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      var M = {
        bot1:  '¡Hola! 👋 Soy el asistente de Clínica Sonrisa. ¿En qué te puedo ayudar hoy?',
        vis1:  'hola, ¿hacen blanqueamiento dental? ¿cuánto sale?',
        bot2:  '¡Sí! 😁 Hacemos blanqueamiento profesional en consultorio. Sale $120.000 e incluye una limpieza previa. La sesión dura 1 hora y se nota el mismo día ✨ ¿Quieres que te agende una cita?',
        vis2:  'siii porfa, ¿esta semana se puede?',
        bot3:  '¡Claro! Estos son los cupos libres para esta semana, elige el que más te sirva 👇',
        vis3:  'el jueves a las 4 me queda perfecto 🙌',
        bot4:  '¡Listo! Tu cita quedó agendada 🦷 Te enviaré un recordatorio por WhatsApp un día antes. ¡Nos vemos!'
      };

      var AV = '<div class="av-sm"><img src="assets/gen/sonrisa-avatar.webp" alt="" loading="lazy" decoding="async" /></div>';
      var DOTS = '<span></span><span></span><span></span>';

      var SLOTS = [
        { id: 'mie', label: 'Mié 10:00', ic: 'calendar' },
        { id: 'jue', label: 'Jue 4:00 PM', ic: 'clock' },
        { id: 'vie', label: 'Vie 11:30', ic: 'calendar' }
      ];
      function chipHtml(s) {
        return '<span class="chip" data-chip="' + s.id + '">' +
          '<span class="ic" data-icon="' + s.ic + '" data-size="18" data-stroke="2.2"></span>' + s.label + '</span>';
      }
      function slotsHtml() {
        var h = '<div class="chips">';
        for (var i = 0; i < SLOTS.length; i++) h += chipHtml(SLOTS[i]);
        return h + '</div>';
      }
      function confHtml() {
        return '<div class="confcard">' +
          '<div class="conf-head"><span class="ic" data-icon="check-circle" data-size="24" data-stroke="2.4" data-color="#16a34a"></span>' +
            '<span class="ct">Cita confirmada</span></div>' +
          '<div class="conf-row lead"><span class="ic" data-icon="sparkles" data-size="21" data-stroke="2.2"></span> Blanqueamiento dental</div>' +
          '<div class="conf-row"><span class="ic" data-icon="calendar" data-size="21" data-stroke="2.2"></span> Jueves · 4:00 PM</div>' +
          '<div class="conf-row"><span class="ic" data-icon="clock" data-size="21" data-stroke="2.2"></span> 1 hora · Dra. Reyes</div>' +
          '<div class="conf-row"><span class="ic" data-icon="map-pin" data-size="21" data-stroke="2.2"></span> Clínica Sonrisa</div>' +
        '</div>';
      }

      function el(cls, html) {
        var d = document.createElement('div');
        d.className = cls; d.innerHTML = html;
        feed.appendChild(d); paintIcons(d);
        return d;
      }
      function reveal(node) {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { node.classList.add('shown'); });
        });
      }
      function addVisitor(t) { return el('row out', '<div class="msg msg-out">' + t + '</div>'); }
      function addBot(t)     { return el('row in', AV + '<div class="msg msg-in">' + t + '</div>'); }
      function addTyping()   { return el('row in typing-row', AV + '<div class="msg msg-in typing">' + DOTS + '</div>'); }
      function addSlots(t)   { return el('row in', AV + '<div class="botcol"><div class="msg msg-in">' + t + '</div>' + slotsHtml() + '</div>'); }
      function addConfirm(t) { return el('row in', AV + '<div class="botcol"><div class="msg msg-in">' + t + '</div>' + confHtml() + '</div>'); }
      function pickSlot(id) {
        var c = feed.querySelector('[data-chip="' + id + '"]');
        if (c) c.classList.add('sel');
      }

      if (reduce) {
        launcher.classList.add('open');
        panel.classList.add('open');
        addBot(M.bot1).classList.add('shown');
        addVisitor(M.vis1).classList.add('shown');
        addBot(M.bot2).classList.add('shown');
        addVisitor(M.vis2).classList.add('shown');
        addSlots(M.bot3).classList.add('shown');
        addVisitor(M.vis3).classList.add('shown');
        addConfirm(M.bot4).classList.add('shown');
        pickSlot('jue');
        return;
      }

      var timers = [];
      function after(ms, fn) { timers.push(setTimeout(fn, ms)); }
      function clearTimers() { timers.forEach(clearTimeout); timers = []; }

      function runCycle() {
        clearTimers();
        feed.classList.remove('dissolving');
        feed.innerHTML = '';
        panel.classList.remove('open');
        launcher.classList.remove('open');

        var t = 0;
        var typingNode = null;
        function clearTyping() {
          if (typingNode && typingNode.parentNode) typingNode.parentNode.removeChild(typingNode);
          typingNode = null;
        }

        // Pulse the launcher (invite), then OPEN the panel near-fullscreen.
        after((t += 60),   function () { launcher.classList.add('pulsing'); });
        after((t += 2300), function () {
          launcher.classList.remove('pulsing');
          launcher.classList.add('open');
          panel.classList.add('open');
        });

        after((t += 560),  function () { reveal(addBot(M.bot1)); });

        after((t += 1300), function () { reveal(addVisitor(M.vis1)); });
        after((t += 1450), function () { typingNode = addTyping(); reveal(typingNode); });
        after((t += 1450), function () { clearTyping(); reveal(addBot(M.bot2)); });

        after((t += 2200), function () { reveal(addVisitor(M.vis2)); });
        after((t += 1450), function () { typingNode = addTyping(); reveal(typingNode); });
        after((t += 1450), function () { clearTyping(); reveal(addSlots(M.bot3)); });

        after((t += 2300), function () { reveal(addVisitor(M.vis3)); pickSlot('jue'); });
        after((t += 1450), function () { typingNode = addTyping(); reveal(typingNode); });
        after((t += 1500), function () { clearTyping(); reveal(addConfirm(M.bot4)); });

        after((t += 5000), function () { feed.classList.add('dissolving'); });
        after((t += 520),  function () {
          panel.classList.remove('open');
          launcher.classList.remove('open');
        });
        after((t += 760),  function () { runCycle(); });
      }

      function start() { after(300, runCycle); }
      if (document.readyState === 'complete') start();
      else window.addEventListener('load', start, { once: true });
    })();
  </script>
</body>
</html>
