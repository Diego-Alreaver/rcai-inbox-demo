<head>

<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%237354EF'/%3E%3Ccircle%20cx='12'%20cy='16'%20r='2.6'%20fill='white'/%3E%3Ccircle%20cx='20'%20cy='16'%20r='2.6'%20fill='white'/%3E%3C/svg%3E" />

<body>
<script>
window.DEMO_CONFIG = {
  id: 'instagram-comments',
  mode: 'mobile',
  platform: 'instagram',
  surface: 'phone',
  business: { name: 'Aura Boutique', handle: 'aura.boutique', avatar: 'assets/gen/aura-avatar.webp', online: true },
  igProfile: { followers: { es: '18,4 mil seguidores', en: '18.4K followers' } },
  contentImage: 'assets/gen/aura-dress.webp',
  scene: 'order',
  commentFlow: true,
  // Public-post context the flow starts from. The phone first shows the post +
  // the customer's comment + the bot's PUBLIC reply, then cross-fades to the DM
  // (the thread) where the order is built and confirmed — no payment link.
  post: {
    image: 'assets/gen/aura-dress.webp',
    kind: 'post',
    caption: {
      es: '✨ Nuevo drop: Vestido Aura midi en lino. El básico elegante que va de la oficina al brunch sin cambiarte 🤍 #NuevaColección',
      en: '✨ New drop: the Aura midi dress in linen. The elegant staple that takes you from office to brunch without a change 🤍 #NewCollection'
    },
    comment: {
      user: 'valen.rios',
      text: { es: 'Aaay me encanta 😍 ¿cuánto cuesta? ¿queda en M?', en: 'Omg I love it 😍 how much? do you have it in M?' }
    },
    publicReply: {
      es: '¡Hola, hermosa! 🤍 Te respondimos por DM con el precio y las tallas 💬',
      en: 'Hi lovely! 🤍 We replied in your DMs with the price and sizes 💬'
    }
  },
  order: {
    number: '2074',
    status: 'confirmed',
    customer: { name: 'Valentina Ríos', platform: 'instagram' },
    items: [
      { name: { es: 'Vestido Aura midi — lino', en: 'Aura midi dress — linen' }, qty: 1,
        note: { es: 'Talla M · color crudo', en: 'Size M · ecru' } }
    ],
    checkout: [
      { q: { es: '¿Envío a domicilio o retiro en tienda?', en: 'Home delivery or store pickup?' },
        a: { es: 'Envío a domicilio', en: 'Home delivery' } }
    ]
  },
  locales: {
    es: {
      stage: {
        eyebrow: 'Comentarios de Instagram',
        h1: 'Tus comentarios de Instagram',
        h1accent: 'se vuelven pedidos.',
        sub: 'Tu boutique responde cada “¿precio?” al instante, lleva la conversación al DM con foto y detalles, arma el pedido y te lo deja registrado — aunque estés durmiendo.',
        ticks: [
          'Responde precio y tallas al instante, en público o por DM',
          'Mueve el comentario al DM con la foto y arma el pedido',
          'Confirma con número de orden y te avisa para cerrar la venta'
        ],
        cta: 'Conecta tu Instagram'
      },
      thread: [
        { from: 'bot', text: '¡Hola de nuevo por aquí! 👋 El vestido que comentaste es el Aura midi en lino. Cuesta $139.900 con envío gratis, y sí — ¡nos queda en talla M! 🙌 Mira cómo se ve 👇' },
        { from: 'bot', beat: 'photo' },
        { from: 'customer', text: 'Me encanta 🥹 lo quiero en M porfa' },
        { from: 'bot', text: '¡Excelente elección! 😍 Te lo aparto en talla M. Una última cosa para dejar tu pedido listo: ¿lo quieres con envío a domicilio o prefieres retirarlo en la tienda?' },
        { from: 'customer', text: 'Con envío a domicilio porfa 🏠' },
        { from: 'bot', beat: 'orderConfirm', text: '¡Perfecto! 🎉 Tu pedido quedó registrado con el número #2074 — Vestido Aura midi (talla M), envío a domicilio. Alguien de Aura Boutique te escribirá por aquí para coordinar el pago y afinar los detalles. ¡Gracias por elegirnos! 🤍' },
        { from: 'bot', beat: 'openOrder', text: 'Y aquí lo tienes: tu pedido queda guardado en el sistema para que tu equipo lo revise cuando quiera 👇' }
      ]
    },
    en: {
      stage: {
        eyebrow: 'Instagram comments',
        h1: 'Your Instagram comments',
        h1accent: 'turn into orders.',
        sub: 'Your boutique answers every “price?” instantly, moves the chat to the DM with a photo and details, builds the order and leaves it logged for you — even while you sleep.',
        ticks: [
          'Answers price and sizes instantly, in public or by DM',
          'Moves the comment to the DM with the photo and builds the order',
          'Confirms with an order number and pings you to close the sale'
        ],
        cta: 'Connect your Instagram'
      },
      thread: [
        { from: 'bot', text: 'Hi again, over here! 👋 The dress you commented on is the Aura midi in linen. It’s $139,900 with free shipping, and yes — we have it in size M! 🙌 Here’s how it looks 👇' },
        { from: 'bot', beat: 'photo' },
        { from: 'customer', text: 'I love it 🥹 I’ll take it in M please' },
        { from: 'bot', text: 'Great choice! 😍 I’ll set one aside in size M. One last thing to lock in your order: would you like home delivery or store pickup?' },
        { from: 'customer', text: 'Home delivery please 🏠' },
        { from: 'bot', beat: 'orderConfirm', text: 'Perfect! 🎉 Your order is in with number #2074 — Aura midi dress (size M), home delivery. Someone from Aura Boutique will message you here to arrange payment and finalize the details. Thanks for choosing us! 🤍' },
        { from: 'bot', beat: 'openOrder', text: 'And here it is: your order stays saved in the system for your team to review anytime 👇' }
      ]
    }
  }
};
window.RCAIDemo.boot();
</script>
