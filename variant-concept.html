<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ReadyChatAI · Un bot, todos tus canales</title>
<!-- Inline favicon so the demo emits zero 404s (no external favicon request). -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%237354EF'/%3E%3Ccircle%20cx='12'%20cy='16'%20r='2.6'%20fill='white'/%3E%3Ccircle%20cx='20'%20cy='16'%20r='2.6'%20fill='white'/%3E%3C/svg%3E" />

<!-- Google Fonts: Urbanist (the real app wires next/font Urbanist to --font-urbanist) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Tailwind v3 Play CDN (matches the repo's Tailwind 3.4) -->
<script src="https://cdn.tailwindcss.com/3.4.16"></script>

<style>
  :root {
    /* Brand Colors (globals.css :root, verbatim) */
    --brand-secondary: #7f56d9;
    --brand-700: #7354ef;
    --brand-500: #9e77ed;
    --gray-50: #f9fafb;
    --gray-300: #d0d5dd;
    --font-urbanist: 'Urbanist', sans-serif;

    /* Channel brand colors */
    --c-whatsapp: #25d366;
    --c-facebook: #1877f2;
    --c-instagram: #d6249f;   /* anchor of the IG gradient */
    --c-web: #7354ef;
  }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }

  html, body { margin: 0; height: 100%; }

  /* RemixIcon webfont sizing (1u = 4px) — mirror the realtime variant's helpers. */
  i.ri-size-3   { font-size: 12px;    line-height: 1; }
  i.ri-size-3-5 { font-size: 14px;    line-height: 1; }
  i.ri-size-4   { font-size: 16px;    line-height: 1; }
  i.ri-size-5   { font-size: 20px;    line-height: 1; }
  i.ri-size-6   { font-size: 24px;    line-height: 1; }
  i.ri-size-7   { font-size: 28px;    line-height: 1; }
  i[class*="ri-"] { display: inline-flex; vertical-align: middle; }

  /* ============================================================
     STAGE — a fixed 1440x880 canvas (matches the landing iframe).
     A subtly-gradient light backdrop so the piece reads as a clean
     hero illustration, NOT the literal dashboard.
     ============================================================ */
  #stage {
    position: relative;
    width: 1440px;
    height: 880px;
    margin: 0 auto;
    overflow: hidden;
    background:
      radial-gradient(1200px 700px at 50% 38%, #ffffff 0%, #faf8ff 46%, #f3effc 100%),
      linear-gradient(180deg, #ffffff, #f6f3fe);
    font-family: var(--font-urbanist);
    color: #1d2939;
  }
  /* Faint dotted grid + soft brand orbs to add depth without clutter. */
  #stage::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(115,84,239,0.06) 1.4px, transparent 1.4px);
    background-size: 30px 30px;
    pointer-events: none;
  }
  .orb { position: absolute; border-radius: 9999px; filter: blur(60px); pointer-events: none; opacity: 0.5; }
  .orb-1 { width: 420px; height: 420px; left: -120px; top: -90px;  background: radial-gradient(circle, rgba(158,119,237,0.45), transparent 70%); }
  .orb-2 { width: 480px; height: 480px; right: -140px; bottom: -120px; background: radial-gradient(circle, rgba(115,84,239,0.40), transparent 70%); }

  /* ---- Header line (concept caption — honest framing: this is an illustration) ---- */
  .stage-head { position: absolute; top: 48px; left: 0; right: 0; text-align: center; z-index: 6; }
  .stage-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: #7354ef;
    background: rgba(115,84,239,0.08);
    padding: 7px 16px; border-radius: 9999px;
  }
  .stage-title { margin: 18px 0 0; font-size: 40px; font-weight: 800; letter-spacing: -0.02em; color: #101828; }
  .stage-title .accent { color: #7354ef; }
  .stage-sub { margin: 10px 0 0; font-size: 18px; font-weight: 500; color: #667085; }

  /* ============================================================
     CHANNEL NODES — parked in an arc around the bot. The static ring
     tells the multichannel story before anything moves.
     ============================================================ */
  .node {
    position: absolute; z-index: 5;
    width: 132px;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .node-badge {
    width: 84px; height: 84px; margin: 0 auto;
    border-radius: 26px;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff;
    box-shadow: 0 10px 30px -10px rgba(16,24,40,0.22), 0 0 0 1px rgba(16,24,40,0.04);
    position: relative;
    transition: transform 220ms cubic-bezier(0.16,1,0.3,1);
  }
  .node-badge i { font-size: 42px; line-height: 1; }
  .node-badge.ig {
    background: linear-gradient(135deg, #feda75 0%, #fa7e1e 26%, #d62976 52%, #962fbf 76%, #4f5bd5 100%);
  }
  .node-badge.ig i { color: #fff; }
  .node-label { margin-top: 12px; font-size: 15px; font-weight: 700; color: #344054; }
  .node-people { font-size: 13px; font-weight: 500; color: #98a2b3; margin-top: 1px; }

  /* Active node lift + ring while it is the channel "in play". */
  .node.is-active .node-badge { transform: scale(1.08); }
  .node.is-active .node-badge::after {
    content: ""; position: absolute; inset: -7px; border-radius: 30px;
    border: 2.5px solid currentColor; opacity: 0.55;
    animation: nodeRing 1.1s ease-out infinite;
  }
  .node.wa .node-badge::after { color: var(--c-whatsapp); }
  .node.fb .node-badge::after { color: var(--c-facebook); }
  .node.ig .node-badge::after { color: var(--c-instagram); }
  .node.web .node-badge::after { color: var(--c-web); }
  @keyframes nodeRing {
    0%   { transform: scale(0.9);  opacity: 0.55; }
    100% { transform: scale(1.25); opacity: 0; }
  }

  /* ============================================================
     BOT — friendly robot, dead-center, brand purple. Always alive.
     ============================================================ */
  #bot {
    position: absolute; left: 720px; top: 470px; z-index: 4;
    transform: translate(-50%, -50%);
    width: 230px; height: 230px;
    display: flex; align-items: center; justify-content: center;
  }
  .bot-disc {
    width: 188px; height: 188px; border-radius: 9999px;
    background: linear-gradient(160deg, #8b5cf6 0%, #7354ef 55%, #6d28d9 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 28px 60px -18px rgba(115,84,239,0.65), inset 0 2px 8px rgba(255,255,255,0.25);
    position: relative;
  }
  .bot-disc i { color: #fff; font-size: 96px; line-height: 1; filter: drop-shadow(0 4px 6px rgba(76,29,149,0.35)); }
  .bot-name {
    position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    background: #ffffff; color: #7354ef; font-weight: 800; font-size: 14px;
    padding: 5px 14px; border-radius: 9999px;
    box-shadow: 0 8px 20px -8px rgba(16,24,40,0.28), 0 0 0 1px rgba(115,84,239,0.10);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .bot-name .dot { width: 7px; height: 7px; border-radius: 9999px; background: #17b26a; box-shadow: 0 0 0 3px rgba(23,178,106,0.18); }

  /* Resting bob — the bot is ALWAYS gently alive. */
  @keyframes botBob {
    0%   { transform: translateY(0)     rotate(0deg); }
    25%  { transform: translateY(-7px)  rotate(-4deg); }
    50%  { transform: translateY(0)     rotate(0deg); }
    75%  { transform: translateY(-7px)  rotate(4deg); }
    100% { transform: translateY(0)     rotate(0deg); }
  }
  .bot-disc { animation: botBob 3.4s ease-in-out infinite; transform-origin: 50% 70%; }
  /* Halo blooms behind the disc while the bot "thinks". */
  .bot-halo {
    position: absolute; width: 232px; height: 232px; border-radius: 9999px;
    background: radial-gradient(circle, rgba(115,84,239,0.30), rgba(115,84,239,0) 68%);
    opacity: 0; transition: opacity 150ms ease;
  }
  #bot.is-thinking .bot-halo { opacity: 1; animation: haloPulse 0.95s ease-in-out infinite; }
  @keyframes haloPulse { 0%,100% { transform: scale(0.92); } 50% { transform: scale(1.06); } }
  /* Thinking: faster, more energetic bob. */
  @keyframes botThink {
    0%   { transform: translateY(0)    rotate(-6deg) scale(1); }
    50%  { transform: translateY(-6px) rotate(6deg)  scale(1.07); }
    100% { transform: translateY(0)    rotate(-6deg) scale(1); }
  }
  #bot.is-thinking .bot-disc { animation: botThink 0.62s ease-in-out infinite; }
  /* Springy react-pop when a new customer message lands. */
  @keyframes botReact {
    0%   { transform: scale(1)    rotate(0deg); }
    35%  { transform: scale(1.12) rotate(-6deg); }
    70%  { transform: scale(0.97) rotate(3deg); }
    100% { transform: scale(1)    rotate(0deg); }
  }
  #bot.is-reacting .bot-disc { animation: botReact 560ms cubic-bezier(0.16,1,0.3,1) both; }

  /* Three thinking dots that surface over the bot while it composes. */
  .bot-thinking-dots {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; opacity: 0; transition: opacity 200ms ease; pointer-events: none;
  }
  #bot.is-thinking .bot-thinking-dots { opacity: 1; }
  .bot-thinking-dots span {
    width: 9px; height: 9px; border-radius: 9999px; background: #7354ef;
    animation: thinkDot 1s infinite ease-in-out;
  }
  .bot-thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
  .bot-thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes thinkDot { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* ============================================================
     FLOATING BUBBLES — created by JS. They travel a real distance
     between a channel node and the bot. Customer = inbound (gray,
     from the channel). Bot reply = outbound (purple, back to channel).
     ============================================================ */
  .bubble {
    position: absolute; z-index: 7;
    max-width: 286px;
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 16px; font-weight: 500; line-height: 1.4;
    box-shadow: 0 16px 34px -14px rgba(16,24,40,0.30);
    will-change: transform, opacity;
    transform: translate(-50%, -50%) scale(0.6);
    opacity: 0;
    transition:
      transform 720ms cubic-bezier(0.22, 1, 0.36, 1),
      opacity 360ms ease;
  }
  .bubble .b-head {
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 700; margin-bottom: 4px;
  }
  .bubble .b-head i { font-size: 15px; line-height: 1; }
  .bubble.inbound {
    background: #ffffff; color: #1d2939;
    border-bottom-left-radius: 5px;
    box-shadow: 0 16px 34px -14px rgba(16,24,40,0.30), 0 0 0 1px rgba(16,24,40,0.05);
  }
  .bubble.inbound .b-head { color: #667085; }
  .bubble.outbound {
    background: linear-gradient(150deg, #8b5cf6, #7354ef);
    color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 18px 38px -14px rgba(115,84,239,0.62);
  }
  .bubble.outbound .b-head { color: rgba(255,255,255,0.92); }
  .bubble .b-meta { display: flex; align-items: center; gap: 4px; margin-top: 5px; font-size: 11px; opacity: 0.7; justify-content: flex-end; }

  /* The "settled" state JS toggles after travel — gives a beat to read. */
  .bubble.settled { transform: translate(-50%, -50%) scale(1); opacity: 1; }

  /* ---- DOCKED state: once an exchange is done, both bubbles shrink and park
          next to their channel node, so the scene ACCUMULATES — by the end the
          bot has visibly served all four channels (the literal "un bot, todos
          tus canales" picture, and something to READ during the long hold).
          Font stays at 15px (not 13px) so the docked text survives the landing
          hero's CSS down-scale and the long end-hold is genuinely readable. ---- */
  .bubble.docked {
    max-width: 244px;
    padding: 10px 14px;
    font-size: 15px;
    border-radius: 14px;
    box-shadow: 0 10px 24px -12px rgba(16,24,40,0.26);
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    transition:
      transform 560ms cubic-bezier(0.22, 1, 0.36, 1),
      max-width 560ms cubic-bezier(0.22, 1, 0.36, 1),
      padding 560ms ease,
      font-size 560ms ease,
      opacity 320ms ease;
  }
  .bubble.docked .b-head { font-size: 12px; margin-bottom: 3px; }
  .bubble.docked .b-head i { font-size: 14px; }
  .bubble.docked .b-meta { display: none; }
  .bubble.docked.inbound { box-shadow: 0 10px 24px -12px rgba(16,24,40,0.26), 0 0 0 1px rgba(16,24,40,0.05); }
  .bubble.docked.outbound { box-shadow: 0 12px 26px -12px rgba(115,84,239,0.48); }

  /* ---- LEAVING state: on loop reset, every live bubble fades + shrinks slightly
          so the end scene DISSOLVES instead of hard-popping (the only un-premium
          moment the panel flagged). JS staggers this per bubble for a cascade. ---- */
  .bubble.leaving {
    opacity: 0 !important;
    transform: translate(-50%, -50%) scale(0.92) !important;
    transition: transform 320ms ease, opacity 320ms ease !important;
  }

  /* ---- CYCLE RESTART — after the dissolve the stage holds the bare bot+ring for
          a beat; fade the bot + nodes back in so that beat reads as a deliberate
          breath, not a dead frame, before the first message of the new loop. ---- */
  #bot, .node {
    transition: opacity 300ms ease;
  }
  #stage.is-restarting #bot,
  #stage.is-restarting .node { opacity: 0; }

  /* ============================================================
     REDUCED MOTION — render a composed static scene (bot + ring +
     one resting bubble per channel). The concept still reads.
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .bot-disc, #bot.is-thinking .bot-disc, .bot-halo, .bot-thinking-dots span,
    .node.is-active .node-badge::after {
      animation: none !important;
    }
    .bubble, .bubble.leaving, #bot, .node { transition: none !important; }
  }
</style>

<!-- Tailwind config: brand tokens mirrored from tailwind.config.js (kept minimal — this is a concept piece, not the dashboard). -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          urbanist: ['var(--font-urbanist)', 'sans-serif'],
          sans:     ['var(--font-urbanist)', 'sans-serif'],
        },
        colors: {
          'brand-secondary': '#7354EF',
          'brand-whatsapp': '#25d366',
          'brand-facebook': '#1977f2',
        },
      },
    },
  };
</script>
</head>

<body class="font-urbanist">
  <!-- Stage is a fixed 1440x880 canvas so it drops into the landing hero iframe unchanged. -->
  <div id="stage" aria-label="Ilustración: un bot de ReadyChatAI atiende WhatsApp, Facebook, Instagram y el chat web">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="stage-head">
      <span class="stage-eyebrow"><i class="ri-flashlight-fill ri-size-4"></i> Un bot · todos tus canales</span>
      <h1 class="stage-title">Tus clientes escriben donde quieran.<br><span class="accent">ReadyChatAI</span> responde por ti.</h1>
      <p class="stage-sub">WhatsApp · Facebook · Instagram · Chat web — una sola IA atiende todos tus canales.</p>
    </header>

    <!-- Channel nodes (parked in an arc around the bot). -->
    <div class="node wa"  id="node-wa"  style="left:300px; top:300px;">
      <div class="node-badge"><i class="ri-whatsapp-fill" style="color:var(--c-whatsapp)"></i></div>
      <div class="node-label">WhatsApp</div>
      <div class="node-people">Emma Cortés</div>
    </div>
    <div class="node fb"  id="node-fb"  style="left:1140px; top:300px;">
      <div class="node-badge"><i class="ri-messenger-fill" style="color:var(--c-facebook)"></i></div>
      <div class="node-label">Facebook</div>
      <div class="node-people">Mateo Rivas</div>
    </div>
    <div class="node ig"  id="node-ig"  style="left:300px; top:660px;">
      <div class="node-badge ig"><i class="ri-instagram-fill"></i></div>
      <div class="node-label">Instagram</div>
      <div class="node-people">Sofía Delgado</div>
    </div>
    <div class="node web" id="node-web" style="left:1140px; top:660px;">
      <div class="node-badge"><i class="ri-global-line" style="color:var(--c-web)"></i></div>
      <div class="node-label">Chat web</div>
      <div class="node-people">Carlos Méndez</div>
    </div>

    <!-- The bot, dead center. -->
    <div id="bot">
      <div class="bot-halo"></div>
      <div class="bot-disc">
        <i class="ri-robot-2-fill"></i>
        <div class="bot-thinking-dots"><span></span><span></span><span></span></div>
        <div class="bot-name"><span class="dot"></span> Bot · Dulce Lina</div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var stage = document.getElementById('stage');
      var bot = document.getElementById('bot');
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Bot anchor (center of the disc) in stage coordinates.
      var BOT = { x: 720, y: 470 };

      // Each "act": a channel, its node, an inbound customer line, and the bot reply.
      // Copy lifted from the real Dulce Lina · Repostería bakery thread (authentic, short, legible).
      var ACTS = [
        {
          id: 'wa', node: 'node-wa', channel: 'WhatsApp',
          icon: 'ri-whatsapp-fill', color: 'var(--c-whatsapp)', name: 'Emma',
          ask:   '¡Hola! Quiero encargar un pastel 🎂',
          reply: '¡Claro, Emma! ¿Para qué fecha y cuántas personas? 🎉',
        },
        {
          id: 'fb', node: 'node-fb', channel: 'Messenger',
          icon: 'ri-messenger-fill', color: 'var(--c-facebook)', name: 'Mateo',
          ask:   '¿Tienen cupcakes sin gluten? 🧁',
          reply: '¡Sí! Tenemos sin gluten y veganos. Te paso el catálogo 🌱',
        },
        {
          id: 'ig', node: 'node-ig', channel: 'Instagram',
          icon: 'ri-instagram-fill', color: 'var(--c-instagram)', name: 'Sofía',
          ask:   '¡Quedó hermoso el pastel de las fotos! 😍',
          reply: '¡Gracias, Sofía! 💜 ¿Te armo uno parecido para tu evento?',
        },
        {
          id: 'web', node: 'node-web', channel: 'Chat web',
          icon: 'ri-global-line', color: 'var(--c-web)', name: 'Carlos',
          ask:   '¿A qué hora puedo pasar a recoger mi pedido?',
          reply: 'De 9:00 a 19:00, Carlos. Ya está listo para hoy ✅',
        },
      ];

      // ---- Geometry helpers -------------------------------------------------
      function nodeCenter(nodeId) {
        var el = document.getElementById(nodeId);
        var badge = el.querySelector('.node-badge');
        var sRect = stage.getBoundingClientRect();
        var bRect = badge.getBoundingClientRect();
        // Scale-aware: divide back out the landing iframe's CSS scale.
        var scale = sRect.width / 1440 || 1;
        return {
          x: (bRect.left - sRect.left) / scale + (bRect.width / scale) / 2,
          y: (bRect.top - sRect.top) / scale + (bRect.height / scale) / 2,
        };
      }

      // Point a fraction `t` from A toward B (0 = at A, 1 = at B).
      function lerp(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }

      // ---- Bubble factory ---------------------------------------------------
      function makeBubble(act, kind) {
        var b = document.createElement('div');
        b.className = 'bubble ' + kind;
        var headIcon, headText, body;
        if (kind === 'inbound') {
          headIcon = '<i class="' + act.icon + '" style="color:' + act.color + '"></i>';
          headText = act.name + ' · ' + act.channel;
          body = act.ask;
        } else {
          headIcon = '<i class="ri-robot-2-fill"></i>';
          headText = 'Bot';
          body = act.reply;
        }
        // Read-receipt: only WhatsApp renders the double-check tick. Facebook,
        // Instagram and the web widget do not show WhatsApp-style ✓✓, so on those
        // channels we show a plain "enviado" — honest per channel.
        var meta = '';
        if (kind === 'outbound') {
          var tick = act.id === 'wa'
            ? '<i class="ri-check-double-line ri-size-3-5"></i>'
            : '';
          meta = '<div class="b-meta"><span>enviado</span>' + tick + '</div>';
        }
        b.innerHTML =
          '<div class="b-head">' + headIcon + '<span>' + headText + '</span></div>' +
          '<div class="b-body">' + body + '</div>' + meta;
        stage.appendChild(b);
        return b;
      }

      function place(b, pt) { b.style.left = pt.x + 'px'; b.style.top = pt.y + 'px'; }

      // ---- Timeline state machine ------------------------------------------
      // One act at a time (never 4 in flight). Each exchange ACCUMULATES: the
      // customer line + bot reply shrink and dock beside their channel node and
      // STAY. By the last act the bot has visibly served all four channels — the
      // literal "un bot, todos tus canales" picture — then we hold ~6s on that
      // full, readable scene before a clean reset + loop.
      var timers = [];
      var liveBubbles = [];                       // everything on stage (for clean reset)
      function after(ms, fn) { var id = setTimeout(fn, ms); timers.push(id); return id; }
      function clearTimers() { timers.forEach(clearTimeout); timers = []; }
      function track(b) { liveBubbles.push(b); return b; }
      // Dissolve every docked bubble (staggered cascade) instead of a hard pop,
      // then remove the nodes once the fade finishes. `onGone` fires after the
      // last bubble is actually gone so the loop can restart on a clean stage.
      function dissolveBubbles(onGone) {
        var bubbles = liveBubbles.slice();
        liveBubbles = [];
        if (!bubbles.length) { if (onGone) onGone(); return; }
        var STAGGER = 50;   // ~50ms per bubble so the dissolve cascades
        var FADE = 320;     // matches .bubble.leaving transition
        bubbles.forEach(function (b, i) {
          after(i * STAGGER, function () { b.classList.add('leaving'); });
        });
        var last = (bubbles.length - 1) * STAGGER + FADE + 30;
        after(last, function () {
          bubbles.forEach(function (b) { if (b.parentNode) b.parentNode.removeChild(b); });
          if (onGone) onGone();
        });
      }

      var IN_TRAVEL = 760;   // travel duration (matches CSS transition)
      var IN_DWELL  = 1700;  // customer line sits centre-stage to be read
      var THINK     = 1500;  // bot "thinks" — long enough for the halo/dots to bloom
      var OUT_DWELL = 2050;  // bot reply sits centre-stage to be read
      var DOCK      = 560;   // shrink-and-park transition (matches .docked CSS)
      var GAP       = 520;   // beat between acts
      var END_HOLD  = 6000;  // Benjamin: hold long at the end so people can read

      function setActiveNode(id, on) {
        var el = document.getElementById(id);
        if (el) el.classList.toggle('is-active', on);
      }

      // Where a finished exchange parks: a stacked pair just inside each node,
      // on the node→bot line but pulled BACK toward the node so the pair never
      // crowds the central disc. The two acts that share a column (WhatsApp+
      // Instagram on the left, Facebook+Chat-web on the right) must NOT collide,
      // so each corner gets its OWN vertical band: top-corner pairs hug the upper
      // band (just under the header), bottom-corner pairs hug the lower band, with
      // a clear gap through the middle. 15px docked bodies run ≈82px tall, so the
      // inbound→outbound gap is 92px centre-to-centre to stay clear even on a
      // three-line wrap.
      var DOCK_GAP = 92;
      function dockPoints(node) {
        // Pull the X in close to the node so the pair sits well clear of the disc.
        var x = lerp(node, BOT, 0.18).x;
        var top = node.y < BOT.y;               // node sits in the upper half?
        // Anchor each corner in its own band. Top band starts ≈80px below the
        // header; bottom band ends ≈80px above the stage floor. Inbound is the
        // upper bubble of each pair; outbound sits DOCK_GAP below it.
        var inY  = top ? 330 : 560;
        var inDock  = { x: x, y: inY };
        var outDock = { x: x, y: inY + DOCK_GAP };
        return { inDock: inDock, outDock: outDock };
      }

      function runAct(act, onDone) {
        var node = nodeCenter(act.node);
        var docks = dockPoints(node);
        // Read positions: bubbles travel into the mid-band BETWEEN node and bot,
        // clamped so they never collide with the 188px disc or the header text.
        var inStart  = lerp(node, BOT, 0.16);
        var inRead   = lerp(node, BOT, 0.52);   // pulled in from the disc
        var outRead  = lerp(node, BOT, 0.46);

        setActiveNode(act.node, true);

        // 1) Customer message travels IN from the channel, settles centre-band.
        var inB = track(makeBubble(act, 'inbound'));
        place(inB, inStart);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            inB.classList.add('settled');
            place(inB, inRead);
          });
        });

        // 2) Bot reacts (pop) as it lands.
        after(IN_TRAVEL - 120, function () {
          bot.classList.add('is-reacting');
          after(560, function () { bot.classList.remove('is-reacting'); });
        });

        // 3) After dwell, bot starts thinking + the customer line docks to the node.
        after(IN_TRAVEL + IN_DWELL, function () {
          bot.classList.add('is-thinking');
          inB.classList.remove('settled');
          inB.classList.add('docked');
          place(inB, docks.inDock);
        });

        // 4) Bot reply is born at the bot, travels OUT, settles centre-band.
        after(IN_TRAVEL + IN_DWELL + THINK, function () {
          bot.classList.remove('is-thinking');
          var outB = track(makeBubble(act, 'outbound'));
          var outStart = lerp(node, BOT, 0.40);
          place(outB, outStart);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              outB.classList.add('settled');
              place(outB, outRead);
            });
          });

          // 5) Reply dwells (readable), then docks beneath its customer line so the
          //    full mini-exchange persists beside the channel — scene ACCUMULATES.
          after(OUT_DWELL, function () {
            outB.classList.remove('settled');
            outB.classList.add('docked');
            place(outB, docks.outDock);
          });
          after(OUT_DWELL + DOCK, function () {
            setActiveNode(act.node, false);
            if (onDone) onDone();
          });
        });
      }

      function runLoop(i) {
        if (i >= ACTS.length) {
          // Hold ~6s on the FULL scene (bot + all four served channels), then
          // DISSOLVE the docked exchanges (staggered fade, not a hard pop),
          // fade the bot+nodes for a deliberate breath, and loop on a clean stage.
          after(END_HOLD, function () {
            dissolveBubbles(function () {
              stage.classList.add('is-restarting');   // fade bot + nodes out
              after(360, function () {
                stage.classList.remove('is-restarting'); // fade them back in
                after(700, function () { runLoop(0); });
              });
            });
          });
          return;
        }
        runAct(ACTS[i], function () {
          after(GAP, function () { runLoop(i + 1); });
        });
      }

      // ---- Reduced motion: render the composed END scene (all four exchanges
      //      docked beside their channels), so the static frame already reads as
      //      "one bot, every channel" — the concept, no motion needed. ----------
      function renderStatic() {
        ACTS.forEach(function (act) {
          var node = nodeCenter(act.node);
          var docks = dockPoints(node);
          var inB = makeBubble(act, 'inbound');
          inB.classList.add('docked');
          place(inB, docks.inDock);
          var outB = makeBubble(act, 'outbound');
          outB.classList.add('docked');
          place(outB, docks.outDock);
        });
      }

      // Kick off once fonts/layout have settled (node centers depend on layout).
      function start() {
        if (reduce) { renderStatic(); return; }
        // Small initial beat so the static ring registers before motion begins.
        after(700, function () { runLoop(0); });
      }

      if (document.readyState === 'complete') {
        start();
      } else {
        window.addEventListener('load', start, { once: true });
      }
    })();
  </script>
</body>
</html>
